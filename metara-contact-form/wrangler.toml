name = "metara-contact-form"
main = "worker.js"
compatibility_date = "2026-06-01"

# Non-secret environment variables — visible in dashboard, fine for these values
[vars]
FROM_EMAIL = "METARA Website <noreply@contact.metara.co.za>"
TO_EMAIL = "love@metara.co.za"

# ── KV namespace for rate limiting (optional but recommended) ──
# Create with: wrangler kv namespace create RATE_LIMIT_KV
# Then paste the returned id below
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "00ccfdcc259d4ec1851c4f85b376ef19"

# ── Secret (set via CLI, never goes in this file) ──
# wrangler secret put RESEND_API_KEY

[[routes]]
pattern = "contact.metara.co.za"
custom_domain = true